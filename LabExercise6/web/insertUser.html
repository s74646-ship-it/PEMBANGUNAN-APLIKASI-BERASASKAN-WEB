<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
</head>
<body>
    <h2>Register New User</h2>
    <form action="processUser.jsp" method="POST">
        <table border="0">
            <tr>
                <td>Username:</td>
                <td><input type="text" name="username" maxlength="15" required></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" name="password" maxlength="10" required></td>
            </tr>
            <tr>
                <td>First Name:</td>
                <td><input type="text" name="firstname" required></td>
            </tr>
            <tr>
                <td>Last Name:</td>
                <td><input type="text" name="lastname" required></td>
            </tr>
            <tr>
                <td colspan="2"><input type="submit" value="Register"></td>
            </tr>
        </table>
    </form>
    <br>
    <a href="login.jsp">Already registered? Go to Login</a>
</body>
</html>
